<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AgroForte - Painel Interativo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: 16px;
      background: #f3f1e6;
      color: #1f2d16;
      transition: filter 0.2s ease, font-size 0.2s ease;
    }

    header {
      background: #2e6b1f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header h1 {
      margin: 0;
    }

    .saiba-mais {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #7ac943;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .saiba-mais:hover {
      background: #66a835;
    }

    .conteudo {
      padding: 25px;
    }

    .painel {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 240px;
      background: #1f2d16;
      color: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .painel h3 {
      margin-top: 0;
      color: #a6e37a;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #7ac943;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #2e6b1f;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>AgroForte 🌱</h1>
    <p>Força e tecnologia no campo</p>

    <!-- LINK SAIBA MAIS -->
    <a class="saiba-mais" href="https://example.com/agroforte" target="_blank">
      Saiba mais
    </a>
  </header>

  <div class="painel">
    <h3>Controles</h3>

    <label for="brilho">Brilho</label>
    <input type="range" id="brilho" min="60" max="150" value="100">

    <label for="fonte">Tamanho da fonte</label>
    <input type="range" id="fonte" min="12" max="40" value="16">
  </div>

  <div class="conteudo">
    <div class="card">
      <h2>Bem-vindo ao AgroForte</h2>
      <p>
        Plataforma moderna voltada para tecnologia no agronegócio.
      </p>
    </div>

    <div class="card">
      <h2>Inovação no Campo</h2>
      <p>
        O AgroForte representa produtividade, eficiência e crescimento sustentável.
      </p>
    </div>
  </div>

  <footer>
    © 2026 AgroForte - Todos os direitos reservados
  </footer>

  <script>
    const brilho = document.getElementById("brilho");
    const fonte = document.getElementById("fonte");

    brilho.addEventListener("input", () => {
      document.body.style.filter = `brightness(${brilho.value}%)`;
    });

    fonte.addEventListener("input", () => {
      document.body.style.fontSize = fonte.value + "px";
    });
  </script>

</body>
</html>
