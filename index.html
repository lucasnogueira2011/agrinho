<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Brilho e Fonte</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: 16px;
      background: #ffffff;
      color: #000000;
      transition: filter 0.2s ease, font-size 0.2s ease;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .conteudo {
      padding: 20px;
    }

    .painel {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #34495e;
      color: white;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    .caixa {
      background: #f4f4f4;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Meu Site Interativo</h1>
  </header>

  <div class="painel">
    <label for="brilho">Brilho</label>
    <input type="range" id="brilho" min="50" max="150" value="100">

    <label for="fonte">Tamanho da fonte</label>
    <input type="range" id="fonte" min="12" max="40" value="16">
  </div>

  <div class="conteudo">
    <div class="caixa">
      <h2>Bem-vindo!</h2>
      <p>
        Este site permite ajustar o brilho da tela e o tamanho da fonte em tempo real.
      </p>
    </div>
  </div>

  <script>
    const brilho = document.getElementById("brilho");
    const fonte = document.getElementById("fonte");

    brilho.addEventListener("input", () => {
      document.body.style.filter = `brightness(${brilho.value}%)`;
    });

    fonte.addEventListener("input", () => {
      document.body.style.fontSize = fonte.value + "px";
    });
  </script>

</body>
</html>
