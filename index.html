<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AgroForte - Painel Interativo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- MENU -->
  <div class="menu">
    <h1>🌱 AgroForte</h1>
    <a href="https://example.com/agroforte" target="_blank">Saiba mais</a>
  </div>

  <!-- PAINEL -->
  <div class="painel">
    <h3>Menu de Ajustes</h3>

    <label for="brilho">Brilho</label>
    <input type="range" id="brilho" min="60" max="150" value="100">

    <label for="fonte">Tamanho da fonte</label>
    <input type="range" id="fonte" min="12" max="40" value="16">
  </div>

  <!-- CONTEÚDO -->
  <div class="conteudo">
    <div class="card">
      <h2>Bem-vindo ao AgroForte</h2>
      <p>Plataforma agrícola moderna com foco em tecnologia e produtividade no campo.</p>
    </div>

    <div class="card">
      <h2>Gestão Inteligente</h2>
      <p>O AgroForte conecta inovação e sustentabilidade para o agronegócio.</p>
    </div>
  </div>

  <footer>
    © 2026 AgroForte - Todos os direitos reservados
  </footer>

  <script src="script.js"></script>
</body>
</html>
